name: Release

on:
  workflow_run:
    workflows: [CI] # must match `name:` in ci.yml
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # only release the exact commit that passed CI
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release PR and git tags
      pull-requests: write # to open/update the "Version Packages" PR
      id-token: write # to publish to npm with provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run release # changeset version: bump versions + changelog
          publish: pnpm run release:publish # changeset publish: publish to npm + tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # changesets action reads this to set up .npmrc auth
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # used by setup-node's .npmrc
          # Provenance requires a PUBLIC repo — re-enable once this repo is public.
          # NPM_CONFIG_PROVENANCE: "true"
